# Default training hyperparameters
# Output directory will be constructed based on experiment config
# Format: ./checkpoints/{experiment_name}
output_dir: !!null
pretrained_checkpoint: !!null

max_steps: 100000
batch_size: 8
eval_batch_size: 4
grad_accum_steps: 1

# Optimization
learning_rate: 1e-4
warmup_steps: 1000
decay_steps: 30000
decay_lr: 2.5e-6
max_grad_norm: 1.0
b1: 0.9
b2: 0.95
eps: 1e-8
weight_decay: 1e-10

# Precision
bf16: true
fp16: false
precision: bfloat16

# Checkpointing & Evaluation
do_eval: true
eval_split: test
save_steps: 5000
eval_steps: 5000
log_steps: 10

# Efficiency
gradient_checkpointing: false
torch_compile: false
torch_compile_mode: reduce-overhead
num_workers: 4

# Misc
seed: 42
resume: !!null
